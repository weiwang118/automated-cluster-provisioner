steps:

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: Read cluster intent, create cluster, and configure configsync
  script: |
    #!/usr/bin/env bash
    # shellcheck disable=SC2155
    set +x
    set -o pipefail

    HARDWARE_MANAGEMENT_API_ENDPOINT="https://gdchardwaremanagement.googleapis.com"
    if [[ -n "${HARDWARE_MANAGEMENT_API_ENDPOINT_OVERRIDE}" ]]; then
      HARDWARE_MANAGEMENT_API_ENDPOINT=${HARDWARE_MANAGEMENT_API_ENDPOINT_OVERRIDE}
    fi
    HARDWARE_MANAGEMENT_API_VERSION="v1alpha"

    function die() {
      set +x
      step="[Build: ${BUILD_ID}] $1"
      details=$2
      echo ">>> [ERROR] $step"
      echo ">>> [ERROR] Details: $details"
      echo ">>> [ERROR] [Build: ${BUILD_ID}] Cluster Creation Failed for $CLUSTER_NAME: $1"

      if [[ "$MAX_RETRIES" -eq 0 ]]; then
        echo ">>> [ERROR] Marking zone as failed"
        zone_signal "$ZONE_ID" FACTORY_TURNUP_CHECKS_FAILED "$step" "$details"
      else
        # Instead of querying build history with gcloud (which is slow and was counting builds from previous lifecycles),
        # we directly use the TRY_COUNT passed from Zone Watcher to check if we exceeded MAX_RETRIES.
        if [[ "$TRY_COUNT" -gt "$MAX_RETRIES" ]]; then
          echo ">>> [ERROR] Current try count $TRY_COUNT has exhausted max retries $MAX_RETRIES. Marking zone as failed"
          zone_signal "$ZONE_ID" FACTORY_TURNUP_CHECKS_FAILED "$step" "$details"
        else
          echo ">>> [ERROR] Current try count $TRY_COUNT is <= max retries $MAX_RETRIES. Skipping failure signal to allow next retry."
        fi
      fi

      exit 1
    }

    log_build_step() (
      set +x
      message=">>> [Build Step] [Build: ${BUILD_ID}] $*"
      echo "$message"

      zone_signal "$ZONE_ID" FACTORY_TURNUP_CHECKS_STARTED "$message"
    )

    # Sets the `UNDER_FACTORY_CHECKS` to either true if ZoneState is ready, started, or failed
    # or false for all other ZoneStates or for provisioning that bypasses the ZoneState.
    function set_factory_check_flag() {

      zone_store_path=$1

      [[ -n "${UNDER_FACTORY_CHECKS}" ]] && { return; } # UNDER_FACTORY_CHECKS already set
      [[ -z "${zone_store_path}" ]] && { export UNDER_FACTORY_CHECKS=FALSE; echo ">>> [Zone Status] zone signaling disabled"; return ; }

      ZONE_URI="${HARDWARE_MANAGEMENT_API_ENDPOINT}/${HARDWARE_MANAGEMENT_API_VERSION}/${zone_store_path}"

      # Temporarily disable tracing to protect the access token from leaking in logs
      set +x
      out=$(curl -f -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            -X GET \
            "${ZONE_URI}" -s | jq '.state' -r)
      local curl_status=$?
      set -x

      if [[ $curl_status -ne 0 ]]; then
        die "Failed to signal the zone state"
      fi

      if [[ "$out" == "READY_FOR_CUSTOMER_FACTORY_TURNUP_CHECKS" || \
            "$out" == "CUSTOMER_FACTORY_TURNUP_CHECKS_STARTED" || \
            "$out" == "CUSTOMER_FACTORY_TURNUP_CHECKS_FAILED" ]]; then
        echo ">>> [Zone Status] zone signaling enabled"
        export UNDER_FACTORY_CHECKS=TRUE
      else
        echo ">>> [Zone Status] zone signaling disabled"
        export UNDER_FACTORY_CHECKS=FALSE
      fi
    }

    function zone_signal() {
      zone_store_path=$1
      state_signal=$2
      step=$3
      details=$4

      [[ -z "${zone_store_path}" ]] && { echo ">>> [Zone Signal] zone_store_path not provided"; return ; }

      if [[ "$UNDER_FACTORY_CHECKS" == "FALSE" ]]; then
        echo ">>> [Zone Signal] Aborted: UNDER_FACTORY_CHECKS is FALSE"
        return;
      fi

      if [[ "$OPT_IN_BUILD_MESSAGES" != "TRUE" ]]; then
        echo ">>> [Zone Signal] Suppressing message details (OPT_IN_BUILD_MESSAGES != TRUE)"
        step=""
        details=""
      fi

      SIGNAL_URI="${HARDWARE_MANAGEMENT_API_ENDPOINT}/${HARDWARE_MANAGEMENT_API_VERSION}/${zone_store_path}:signal"

      # Use jq to safely generate JSON payload. 
      # Manual string concatenation (e.g. "{\"key\": \"$VAL\"}") breaks if $VAL contains 
      # unescaped double quotes (common in gcloud error messages). jq --arg handles escaping automatically.
      if [[ $state_signal == "FACTORY_TURNUP_CHECKS_STARTED" ]]; then
        state_signal_payload=$(jq -n --arg ss "$state_signal" --arg st "$step" '{"state_signal": $ss, "step": $st}')
      elif [[ $state_signal == "FACTORY_TURNUP_CHECKS_FAILED" ]]; then
        state_signal_payload=$(jq -n --arg ss "$state_signal" --arg st "$step" --arg dt "$details" '{"state_signal": $ss, "step": $st, "details": $dt}')
      else
        state_signal_payload=$(jq -n --arg ss "$state_signal" '{"state_signal": $ss}')
      fi

      echo ">>> [Zone Signal] Sending '${state_signal}' to ${zone_store_path}..."
      echo ">>> [Zone Signal] Payload: ${state_signal_payload}"

      out=$(curl -s -f -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            -X POST \
            "${SIGNAL_URI}" \
            -d "$state_signal_payload")


      if [[ $? -ne 0 ]]; then
        die "Failed to signal the zone state"
      fi
      
      echo ">>> [Zone Signal] Successfully signaled ${state_signal}."

      operation_id=$(echo $out | jq -r .name)
      URI="${HARDWARE_MANAGEMENT_API_ENDPOINT}/${HARDWARE_MANAGEMENT_API_VERSION}/${operation_id}"
      echo ">>> [Zone Signal] Operation ID: ${operation_id}"
      echo ">>> [Zone Signal] Waiting for operation to complete..."
      
      signal_attempts=0
      max_retries_for_signal_completion=10
      while [[ ${signal_attempts} -lt ${max_retries_for_signal_completion} ]]; do
        is_completed=$(curl -s -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            "${URI}" | jq -r .done)
        
        echo ">>> [Zone Signal] Poll attempt $((signal_attempts+1))/${max_retries_for_signal_completion} - done: ${is_completed}"
        
        [[ "${is_completed}" != "false" ]] && break
        sleep 5
        ((signal_attempts++))
      done
      
      if [[ ${signal_attempts} -ge ${max_retries_for_signal_completion} ]]; then
        die "Signal operation timed out"
      else
        echo ">>> [Zone Signal] Operation completed successfully."
        return 0
      fi
    }

    function parse_csv_required() {
      input="$1"
      column="$2"

      output=$(echo "$input" | csvtool namedcol "$column" - | csvtool drop 1 - | tr -d '"')

      [[ $? -ne 0 ]] && die "[INVALID_CLUSTER_INTENT][cluster:${CLUSTER_NAME:-unknown}] missing column header: $column" >&2

      if [ -z "$output" ]; then
        die "[INVALID_CLUSTER_INTENT][cluster:${CLUSTER_NAME:-unknown}] empty cell value: $column" >&2
      fi

      echo "$output"
    }

    function parse_csv_optional() {
      input="$1"
      column="$2"

      output=$(echo "$input" | csvtool namedcol "$column" - | csvtool drop 1 - | tr -d '"')

      echo "$output"
    }

    # Resolves the cluster version to use.
    # 1. Tries to get the version from the main cluster intent CSV.
    # 2. If not specified, falls back to fleet version config file based on fleet_project_id.
    function resolve_cluster_version() {
      local intent="$1"
      local project_id="$2"
      
      local version=$(parse_csv_optional "$intent" "cluster_version")
      
      if [[ -n "$version" ]]; then
        echo ">>> [Config] Cluster version specified in the cluster intent: $version" >&2
        echo "$version"
        return 0
      fi
      
      echo ">>> [Config] Cluster version not specified in the cluster intent, falling back to fleet version config file: $FLEET_CONFIG_PATH" >&2
      
      local fleet_config_path="repo/$FLEET_CONFIG_PATH"
      
      if [[ ! -f "$fleet_config_path" ]]; then
         die "[CUSTOMER_ERROR] Fleet config file not found at $fleet_config_path but required for fallback" >&2
      fi
      local row=$(awk -F , "\$1 == \"$project_id\" || \$1 == \"\\\"$project_id\\\"\"" "$fleet_config_path")
      
      if [[ -z "$row" ]]; then
         die "[CUSTOMER_ERROR] Project $project_id not found in $fleet_config_path" >&2
      fi
      
      local header=$(head -1 "$fleet_config_path")
      local data="$header"$'\n'"$row"
      
      local resolved_version
      resolved_version=$(parse_csv_required "$data" "cluster_version") || return 1
      echo ">>> [Config] Resolved cluster version $resolved_version from fleet version config file $FLEET_CONFIG_PATH for $project_id" >&2
      echo "$resolved_version"
    }

    function assign_required() {
      local var_name="$1"
      local col_name="$2"
      local val
      
      val=$(parse_csv_required "$CLUSTER_INTENT" "$col_name")
      if [[ $? -ne 0 ]]; then
        exit 1
      fi
      
      export "$var_name=$val"
    }



    # Use this function to determine if the required version is met. 
    # Return true if met. Return false if not met. 
    # This can be used when version checking is important.
    function gdc_version_evaluate() (
      set +x
      current_version="$1"
      required_version="$2"

      regex='^([0-9]+(\.[0-9]+)*)'

      if [[ "$current_version" =~ $regex ]]; then
          current_numeric="${BASH_REMATCH[1]}"
      else
          echo ">>> [Version Eval] Error Could not extract numeric part from current version: '$current_version'. Should be in the format X.Y.X, like 1.8.0." >&2
          return 1
      fi

      if [[ "$required_version" =~ $regex ]]; then
          required_numeric="${BASH_REMATCH[1]}"
      else
          echo ">>> [Version Eval] Error Could not extract numeric part from target version: '$required_version'. Should be in the format X.Y.X, like 1.8.0." >&2
          return 1 
      fi

      if [[ "$current_numeric" == "$required_numeric" ]]; then
          echo ">>> [Version Eval] $current_version meets requirement $required_version (Equal)"
          return 0
      fi

      first_sorted_version=$(printf "%s\n%s\n" "$current_numeric" "$required_numeric" | sort -V | head -n1)


      if [[ "$first_sorted_version" == "$required_numeric" ]]; then 
          echo ">>> [Version Eval] $current_version meets requirement $required_version (Newer)"
          return 0
      else
          echo ">>> [Version Eval] $current_version fails requirement $required_version (Older)"
          return 1
      fi
    )

    # Preemptively install required packages silently to maintain clean visual layouts
    apt-get update -qq && apt-get install -y -qq gettext-base csvtool jq > /dev/null

    [[ -z "${STORE_ID}" ]] && die "[INVALID_CLUSTER_INTENT] STORE_ID not set. Please ensure store_id is provided in the trigger."

    NODE_LOCATION=${ZONE}
    [[ -z "$NODE_LOCATION" ]] && die "[INVALID_CLUSTER_INTENT] ZONE not set. Please ensure zone is provided in the trigger."

    TOKEN=$(gcloud secrets versions access latest --secret=$GIT_SECRET_ID --project $GIT_SECRETS_PROJECT_ID) || die "[CUSTOMER_ERROR] Failed to retrieve git token from Secret Manager. Please check secret name and permissions."
    git clone -b $SOURCE_OF_TRUTH_BRANCH https://oauth2:$TOKEN@$SOURCE_OF_TRUTH_REPO repo || die "[CUSTOMER_ERROR] Failed to clone source of truth repository. Please check repo URL and branch."
    cp repo/$SOURCE_OF_TRUTH_PATH ./cluster-intent-registry.csv || die "[CUSTOMER_ERROR] Failed to copy cluster intent file. Please check if SOURCE_OF_TRUTH_PATH is correct."

    export CLUSTER_INTENT_ROW=$(awk -F , "\$1 == \"$STORE_ID\" || \$1 == \"\\\"$STORE_ID\\\"\"" cluster-intent-registry.csv)
    echo ">>> [SoT Parse] $CLUSTER_INTENT_ROW"
    [[ -z "$CLUSTER_INTENT_ROW" ]] && die "[INVALID_CLUSTER_INTENT] Cluster intent not found for store: $STORE_ID"
    export CLUSTER_INTENT_HEADER=$(head -1 cluster-intent-registry.csv)
    export CLUSTER_INTENT="$CLUSTER_INTENT_HEADER"$'\n'"$CLUSTER_INTENT_ROW"

    # Set parameters from cluster intent
    assign_required MACHINE_PROJECT_ID "machine_project_id"
    assign_required FLEET_PROJECT_ID "fleet_project_id"
    assign_required CLUSTER_NAME "cluster_name"
    assign_required LOCATION "location"
    export ZONE_ID="projects/${MACHINE_PROJECT_ID}/locations/${LOCATION}/zones/${STORE_ID}"
    assign_required NODE_COUNT "node_count"
    assign_required CLUSTER_IPV4_CIDR "cluster_ipv4_cidr"
    assign_required SERVICES_IPV4_CIDR "services_ipv4_cidr"
    assign_required EXTERNAL_LOAD_BALANCER_IPV4_ADDRESS_POOLS "external_load_balancer_ipv4_address_pools"
    assign_required SYNC_REPO "sync_repo"
    assign_required SYNC_BRANCH "sync_branch"
    assign_required SYNC_DIR "sync_dir"
    assign_required SECRETS_PROJECT_ID "secrets_project_id"
    assign_required GIT_TOKEN_SECRETS_MANAGER_NAME "git_token_secrets_manager_name"
    
    export CLUSTER_VERSION=$(resolve_cluster_version "$CLUSTER_INTENT" "$FLEET_PROJECT_ID") || exit 1
    
    export MAINTENANCE_WINDOW_START=$(parse_csv_optional "$CLUSTER_INTENT" "maintenance_window_start")
    export MAINTENANCE_WINDOW_END=$(parse_csv_optional "$CLUSTER_INTENT" "maintenance_window_end")
    export MAINTENANCE_WINDOW_RECURRENCE=$(parse_csv_optional "$CLUSTER_INTENT" "maintenance_window_recurrence")
    export SUBNET_VLANS=$(parse_csv_optional "$CLUSTER_INTENT" "subnet_vlans")
    export ENABLE_ROBIN_CNS=$(parse_csv_optional "$CLUSTER_INTENT" "enable_robin_cns")
    export ZONE_NAME_FROM_SOT=$(parse_csv_optional "$CLUSTER_INTENT" "zone_name")
    export LABELS=$(parse_csv_optional "$CLUSTER_INTENT" "labels")
    set -x
    if [[ -n "${ZONE_NAME_FROM_SOT}" ]]; then
      set_factory_check_flag
    else
      set_factory_check_flag "$ZONE_ID"
    fi
    set +x

    if [ -n "${EDGE_CONTAINER_API_ENDPOINT_OVERRIDE:-}" ]; then
      echo ">>> [Config] Setting api_endpoint_overrides/edgecontainer to $EDGE_CONTAINER_API_ENDPOINT_OVERRIDE"
      gcloud config set api_endpoint_overrides/edgecontainer $EDGE_CONTAINER_API_ENDPOINT_OVERRIDE
    fi

    if [ -n "${GKEHUB_API_ENDPOINT_OVERRIDE:-}" ]; then
      echo ">>> [Config] Setting api_endpoint_overrides/gkehub to $GKEHUB_API_ENDPOINT_OVERRIDE"
      gcloud config set api_endpoint_overrides/gkehub $GKEHUB_API_ENDPOINT_OVERRIDE
      GKEHUB_API_ENDPOINT="staging-gkehub.sandbox.googleapis.com"
    else
      GKEHUB_API_ENDPOINT="gkehub.googleapis.com"
    fi

    if [ -n "${CONNECTGATEWAY_API_ENDPOINT_OVERRIDE:-}" ]; then
      echo ">>> [Config] Setting api_endpoint_overrides/connectgateway to $CONNECTGATEWAY_API_ENDPOINT_OVERRIDE"
      gcloud config set api_endpoint_overrides/connectgateway $CONNECTGATEWAY_API_ENDPOINT_OVERRIDE
    fi


    if [ -n "${EDGE_NETWORK_API_ENDPOINT_OVERRIDE:-}" ]; then
      echo ">>> [Config] Setting api_endpoint_overrides/edgenetwork to $EDGE_NETWORK_API_ENDPOINT_OVERRIDE"
      gcloud config set api_endpoint_overrides/edgenetwork $EDGE_NETWORK_API_ENDPOINT_OVERRIDE
    fi

    log_build_step "Beginning provisioning"
  
    set -x

    gcloud edge-cloud container clusters describe $CLUSTER_NAME --location $LOCATION \
        --project $FLEET_PROJECT_ID --verbosity none

    if [ $? -eq 0 ]; then
      log_build_step "Cluster already created, skipping to next step."
    else
      # Create a new FD to support stdout,stderr to console + saving to bash variable
      # This is used to output the opid before the operation has completed
      exec 5>&1

      IDENTITY_SERVICE_ARG=""
      if [[ "${SKIP_IDENTITY_SERVICE}" == "FALSE" ]] && gdc_version_evaluate "${CLUSTER_VERSION}" "1.10.0"; then
        log_build_step "Creating cluster with Group RBAC"
        IDENTITY_SERVICE_ARG="--enable-google-group-authentication"
      else
        log_build_step "Creating cluster"
      fi

      GCLOUD_CMD="gcloud"

      ROBIN_CNS_ARG=""
      if [[ "${ENABLE_ROBIN_CNS,,}" == "true" ]]; then
        if gdc_version_evaluate "${CLUSTER_VERSION}" "1.12.0"; then
          log_build_step "Creating cluster with Robin CNS enabled"
          ROBIN_CNS_ARG="--enable-robin-cns"
          # Update command to use alpha until this flag is GA'ed
          GCLOUD_CMD="gcloud alpha"
        else
          die "[CUSTOMER_ERROR] Invalid Robin CNS request: Robin CNS requires version 1.12.0+ but got ${CLUSTER_VERSION}"
        fi
      fi

      CMD_ARGS=(
        edge-cloud container clusters create "$CLUSTER_NAME"
        --control-plane-node-location="$NODE_LOCATION"
        --control-plane-node-count="$NODE_COUNT"
        --cluster-ipv4-cidr="$CLUSTER_IPV4_CIDR"
        --services-ipv4-cidr="$SERVICES_IPV4_CIDR"
        --external-lb-ipv4-address-pools="$EXTERNAL_LOAD_BALANCER_IPV4_ADDRESS_POOLS"
        --control-plane-shared-deployment-policy=ALLOWED
        --location="$LOCATION"
        --project="$FLEET_PROJECT_ID"
        --release-channel=NONE
        --version "$CLUSTER_VERSION"
        --offline-reboot-ttl=7d
      )
      [[ -n "${IDENTITY_SERVICE_ARG}" ]] && CMD_ARGS+=("${IDENTITY_SERVICE_ARG}")
      [[ -n "${ROBIN_CNS_ARG}" ]] && CMD_ARGS+=("${ROBIN_CNS_ARG}")

      echo ">>> [Cluster Create] Executing command: $GCLOUD_CMD ${CMD_ARGS[*]}"

      out=$(
        $GCLOUD_CMD "${CMD_ARGS[@]}" 2>&1 | tee /dev/fd/5
      )

      [[ $? -ne 0 ]] && die "Failure from gcloud edge-cloud container clusters" "$out"


    fi

    set +x
    if [[ -z "${MAINTENANCE_WINDOW_START}" || -z ${MAINTENANCE_WINDOW_END} || \
            -z ${MAINTENANCE_WINDOW_RECURRENCE} ]]; then
      log_build_step "All maintenance window fields are not set, skipping"
      echo ">>> [Cluster Create] MAINTENANCE_WINDOW_START=${MAINTENANCE_WINDOW_START}"
      echo ">>> [Cluster Create] MAINTENANCE_WINDOW_END=${MAINTENANCE_WINDOW_END}"
      echo ">>> [Cluster Create] MAINTENANCE_WINDOW_RECURRENCE=${MAINTENANCE_WINDOW_RECURRENCE}"
    else
      log_build_step "Setting maintenance window"
      out=$(gcloud edge-cloud container clusters update $CLUSTER_NAME \
          --project=$FLEET_PROJECT_ID \
          --location=$LOCATION \
          --maintenance-window-start=$MAINTENANCE_WINDOW_START \
          --maintenance-window-end=$MAINTENANCE_WINDOW_END \
          --maintenance-window-recurrence=$MAINTENANCE_WINDOW_RECURRENCE)
      [[ $? -ne 0 ]] && die "Maintenance window update failed" "$out"
    fi

    log_build_step "Initializing zone network"
    out=$(gcloud edge-cloud networking zones init $NODE_LOCATION \
      --project=$MACHINE_PROJECT_ID \
      --location=$LOCATION)

    [[ $? -ne 0 ]] && die "Zone network failed to initialize" "$out"

    log_build_step "Configuring zone subnets"
    for vlan in $(echo $SUBNET_VLANS | csvtool transpose -); do
      EXISTING_VLAN=$(gcloud edge-cloud networking subnets list --location $LOCATION \
          --zone $NODE_LOCATION --project $MACHINE_PROJECT_ID \
          --filter="VLANID=$vlan" --format="json")

      [[ $? -ne 0 ]] && die "Unable to query for subnets"

      if [ "$EXISTING_VLAN" = "[]" ]; then
        out=$(gcloud edge-cloud networking subnets create "network-$vlan" \
            --vlan-id=$vlan \
            --network=default \
            --location=$LOCATION \
            --zone=$NODE_LOCATION \
            --project $MACHINE_PROJECT_ID)
        [[ $? -ne 0 ]] && die "Subnet creation failed" "$out"
      else
        echo ">>> [Cluster Create] VLAN $vlan already exists"
      fi
    done

    set -eE
    trap 'die "Error configuring cluster" "Command that failed: $BASH_COMMAND"' ERR

    set -x
    if [ -n "$LABELS" ]; then
      log_build_step "Adding fleet membership labels"
      gcloud container fleet memberships update $CLUSTER_NAME --clear-labels --update-labels $LABELS
    fi

    export KUBECONFIG="$(pwd)/gateway-kubeconfig"
    gcloud container fleet memberships get-credentials $CLUSTER_NAME --project $FLEET_PROJECT_ID

    gcloud storage cp gs://$CLUSTER_INTENT_BUCKET/apply-spec.yaml.template .

    if [[ -n "$CS_VERSION" ]]; then
      export CS_VERSION_YAML="version: $CS_VERSION"
    fi

    envsubst < apply-spec.yaml.template > apply-spec.yaml
    set +x
    log_build_step "Configuring configsync"
    gcloud secrets versions access latest --secret=$GIT_TOKEN_SECRETS_MANAGER_NAME \
        --project $SECRETS_PROJECT_ID >> "$(pwd)/git-creds"
    set -x
    
    set +e # Temporarily disable errexit to safely capture PIPESTATUS
    trap - ERR # Prevent trap from hijacking pipe errors

    kubectl create ns config-management-system --dry-run=client -o yaml | kubectl apply -f -
    rcs=("${PIPESTATUS[@]}")
    [[ ${rcs[0]} -ne 0 ]] && die "Failed to create namespace" "Command failed: kubectl create ns config-management-system --dry-run=client -o yaml (Exit code: ${rcs[0]})"
    [[ ${rcs[1]} -ne 0 ]] && die "Failed to apply namespace" "Command failed: kubectl apply -f - (Exit code: ${rcs[1]})"

    set +x
    kubectl create secret generic git-creds --namespace="config-management-system" \
        --from-literal=username=default --from-file=token="$(pwd)/git-creds" \
        --dry-run=client -o yaml | kubectl apply -f -
    rcs=("${PIPESTATUS[@]}")
    set -x
    [[ ${rcs[0]} -ne 0 ]] && die "Failed to create secret" "Command failed: kubectl create secret generic git-creds ... (Exit code: ${rcs[0]})"
    [[ ${rcs[1]} -ne 0 ]] && die "Failed to apply secret" "Command failed: kubectl apply -f - (Exit code: ${rcs[1]})"

    set -e # Restore errexit
    trap 'die "Error configuring cluster" "Command that failed: $BASH_COMMAND"' ERR # Restore trap

    gcloud beta container fleet config-management apply --membership=$CLUSTER_NAME \
        --config=./apply-spec.yaml --project $FLEET_PROJECT_ID

    gcloud storage cp gs://$CLUSTER_INTENT_BUCKET/fleet-packages-rbac.yaml.template .
    export PROJECT_NUMBER=$(gcloud projects describe $FLEET_PROJECT_ID --format="value(projectNumber)")
    
    envsubst < fleet-packages-rbac.yaml.template > fleet-packages-rbac.yaml

    kubectl apply -f fleet-packages-rbac.yaml

    # Apply old Group RBAC steps if cluster version is less than 1.10.0
    if [[ "${SKIP_IDENTITY_SERVICE}" == "FALSE" ]] &&  ! gdc_version_evaluate "${CLUSTER_VERSION}" "1.10.0"; then
      log_build_step "Configuring manual Group RBAC"
      FLEET_PROJECT_NUMBER=$(gcloud projects describe $FLEET_PROJECT_ID --format='value(projectNumber)')
      kubectl patch clientconfig default -n kube-public --type=merge -p '{"spec":{"authentication":[{"google":{"audiences":["//'${GKEHUB_API_ENDPOINT}'/projects/'${FLEET_PROJECT_NUMBER}'/locations/global/memberships/'${CLUSTER_NAME}'"]},"name":"google-authentication-method"}]}}'
      log_build_step "Group RBAC applied"
    else
      log_build_step "Skipping manual Group RBAC setup"
    fi

    set +x +eE
    trap - ERR

    if [ -z "${SKIP_HEALTH_CHECK}" ]; then
      count=0
      max_retries_for_healthcheck_creation=240 # 1200s/20min
      log_build_step "Waiting for health check resource to be created"
      while [[ ${count} -lt ${max_retries_for_healthcheck_creation} ]]; do
        kubectl get healthchecks.validator.gdc.gke.io/default >/dev/null 2>&1 && break
        echo -n .
        sleep 5
        ((count++))
      done
      [[ ${count} -ge ${max_retries_for_healthcheck_creation} ]] && die "Health check resource not created after 20min"

      log_build_step "Waiting for platform healthchecks to pass"
      if ! kubectl wait healthchecks.validator.gdc.gke.io/default --for condition=PlatformHealthy --timeout=1h; then
        kubectl describe healthchecks.validator.gdc.gke.io/default
        die "Platform is not healthy after 1h. Please review the failed platform health checks."
      fi

      # Calculate workload timeout by removing non-workload related buffer time from the over build timeout.
      # ($TIMEOUT_IN_SECONDS) - (1h for platform health) - (1h for cluster health)
      #                       - (10m for extra buffer) - (30m for vm wait)
      WORKLOAD_TIMEOUT="$(($TIMEOUT_IN_SECONDS-"9600"))"

      log_build_step "Waiting for workload healthchecks to pass"
      if ! kubectl wait healthchecks.validator.gdc.gke.io/default --for condition=WorkloadsHealthy --timeout="${WORKLOAD_TIMEOUT}s"; then
        kubectl describe healthchecks.validator.gdc.gke.io/default
        die "[CUSTOMER_ERROR] Workloads are not healthy after ${WORKLOAD_TIMEOUT}s. Please review the failed workload health checks."
      fi
    fi
    
    set -eE
    trap 'die "Error shutting down VMs" "Command that failed: $BASH_COMMAND"' ERR

    export VIRTCTL_VERSION=v1.2.2
    curl -L https://github.com/kubevirt/kubevirt/releases/download/${VIRTCTL_VERSION}/virtctl-${VIRTCTL_VERSION}-linux-amd64 -o virtctl
    chmod +x virtctl

    log_build_step "Waiting 30m before shutting down VMs"
    sleep 30m

    log_build_step "Shutting down running VMs"
    for vm in $(kubectl get vmi -n vm-workloads --no-headers | awk '{print $1}'); do
      echo ">>> [Cluster Create] Shutting down $vm"
      ./virtctl stop -n vm-workloads $vm
    done

    set +eE
    trap - ERR

    if [ "${BART_CREATE_BUCKET}" = "TRUE" ]; then
      if [[ ! -z $(gcloud storage buckets describe gs://${CLUSTER_NAME}-bart-backup --project=${FLEET_PROJECT_ID}) ]]; then
        echo ">>> [Cluster Create] GCS bucket already exists"
      else
        log_build_step "Creating and setting up new BART related GCS bucket"
        gcloud storage buckets create gs://${CLUSTER_NAME}-bart-backup --location=${LOCATION} --project=${FLEET_PROJECT_ID}
      fi
    else
      echo ">>> [Cluster Create] Backups for this cluster is not enabled."
    fi

    zone_signal "$ZONE_ID" FACTORY_TURNUP_CHECKS_PASSED

    echo ">>> [Cluster Create] Cluster Creation Succeeded: $CLUSTER_NAME"

  env:
  - 'BUILD_ID=$BUILD_ID'
  - 'EDGE_CONTAINER_API_ENDPOINT_OVERRIDE=$_EDGE_CONTAINER_API_ENDPOINT_OVERRIDE'
  - 'EDGE_NETWORK_API_ENDPOINT_OVERRIDE=$_EDGE_NETWORK_API_ENDPOINT_OVERRIDE'
  - 'GKEHUB_API_ENDPOINT_OVERRIDE=$_GKEHUB_API_ENDPOINT_OVERRIDE'
  - 'CONNECTGATEWAY_API_ENDPOINT_OVERRIDE=$_CONNECTGATEWAY_API_ENDPOINT_OVERRIDE'
  - 'HARDWARE_MANAGEMENT_API_ENDPOINT_OVERRIDE=$_HARDWARE_MANAGEMENT_API_ENDPOINT_OVERRIDE'
  - 'CLUSTER_INTENT_BUCKET=$_CLUSTER_INTENT_BUCKET'
  - 'SOURCE_OF_TRUTH_REPO=$_SOURCE_OF_TRUTH_REPO'
  - 'SOURCE_OF_TRUTH_BRANCH=$_SOURCE_OF_TRUTH_BRANCH'
  - 'SOURCE_OF_TRUTH_PATH=$_SOURCE_OF_TRUTH_PATH'
  - 'FLEET_CONFIG_PATH=$_FLEET_CONFIG_PATH'
  - 'GIT_SECRET_ID=$_GIT_SECRET_ID'
  - 'GIT_SECRETS_PROJECT_ID=$_GIT_SECRETS_PROJECT_ID'
  - 'SKIP_HEALTH_CHECK=$_SKIP_HEALTH_CHECK'
  - 'SKIP_IDENTITY_SERVICE=$_SKIP_IDENTITY_SERVICE'
  - 'TIMEOUT_IN_SECONDS=$_TIMEOUT_IN_SECONDS'
  - 'STORE_ID=$_STORE_ID'
  - 'ZONE=$_ZONE'
  - 'CS_VERSION=$_CS_VERSION'
  - 'BART_CREATE_BUCKET=$_BART_CREATE_BUCKET'
  - 'MAX_RETRIES=$_MAX_RETRIES'
  - 'TRIGGER_NAME=$TRIGGER_NAME'
  - 'OPT_IN_BUILD_MESSAGES=$_OPT_IN_BUILD_MESSAGES'
  - 'TRY_COUNT=$_TRY_COUNT'
  - 'INTENT_HASH=$_INTENT_HASH'

options:
  logging: CLOUD_LOGGING_ONLY
tags:
- $_STORE_ID
- $_ZONE
